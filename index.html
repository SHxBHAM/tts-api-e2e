<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VoxCPM2 Hinglish TTS</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --fg:#e8eaf0; --mut:#9aa0b4; --acc:#6d8cff; --br:#2a2e3c; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width:820px; margin:0 auto; padding:24px 16px 60px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 20px; font-size:13px; }
  .card { background:var(--card); border:1px solid var(--br); border-radius:12px; padding:16px; margin-bottom:18px; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  textarea, input, select { width:100%; background:#11141d; color:var(--fg); border:1px solid var(--br);
    border-radius:8px; padding:10px; font:inherit; }
  textarea { resize:vertical; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:120px; }
  .tabs { display:flex; gap:6px; margin-bottom:14px; }
  .tab { padding:8px 14px; border:1px solid var(--br); border-radius:8px; background:var(--card);
    color:var(--mut); cursor:pointer; font-size:14px; }
  .tab.active { color:#fff; border-color:var(--acc); background:#222742; }
  button.go { margin-top:14px; background:var(--acc); color:#fff; border:0; border-radius:8px;
    padding:11px 18px; font-size:15px; font-weight:600; cursor:pointer; }
  button.go:disabled { opacity:.5; cursor:default; }
  .clip { border:1px solid var(--br); border-radius:8px; padding:10px; margin-top:10px; }
  .clip .meta { font-size:12px; color:var(--mut); margin-bottom:6px; word-break:break-word; }
  .clip.err { border-color:#7a2d2d; }
  audio { width:100%; }
  a.dl { color:var(--acc); font-size:13px; text-decoration:none; margin-left:8px; }
  .status { font-size:13px; color:var(--mut); margin-top:10px; min-height:18px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>VoxCPM2 · Hinglish TTS</h1>
  <p class="sub">Devanagari text in → mp3/wav out. Single or batch.</p>

  <div class="card">
    <label>API token (Bearer)</label>
    <input id="token" type="password" placeholder="shared API_TOKEN" autocomplete="off" />
    <div class="row" style="margin-top:10px">
      <div>
        <label>Format</label>
        <select id="format"><option value="mp3">mp3</option><option value="wav">wav</option></select>
      </div>
      <div><label>cfg (1–5)</label><input id="cfg" type="number" value="2.0" step="0.1" min="1" max="5" /></div>
      <div><label>timesteps (1–50)</label><input id="timesteps" type="number" value="10" min="1" max="50" /></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="single">Single</div>
    <div class="tab" data-tab="batch">Batch</div>
  </div>

  <div class="card" id="pane-single">
    <label>Text</label>
    <textarea id="single-text" rows="4" placeholder="नमस्ते बच्चों, आज हम एरिया ऑफ़ अ पॉलीगॉन पढ़ेंगे।"></textarea>
    <button class="go" id="single-go">Generate</button>
    <div class="status" id="single-status"></div>
    <div id="single-out"></div>
  </div>

  <div class="card hidden" id="pane-batch">
    <label>Texts — one per line</label>
    <textarea id="batch-text" rows="8" placeholder="पहली लाइन।&#10;दूसरी लाइन।&#10;तीसरी लाइन।"></textarea>
    <button class="go" id="batch-go">Generate all</button>
    <div class="status" id="batch-status"></div>
    <div id="batch-out"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const cfg = () => ({
  format: $("#format").value,
  cfg: parseFloat($("#cfg").value),
  timesteps: parseInt($("#timesteps").value, 10),
});
const authHeaders = () => {
  const h = { "Content-Type": "application/json" };
  const t = $("#token").value.trim();
  if (t) h["Authorization"] = "Bearer " + t;
  return h;
};

// tabs
document.querySelectorAll(".tab").forEach(tab => tab.onclick = () => {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  $("#pane-single").classList.toggle("hidden", tab.dataset.tab !== "single");
  $("#pane-batch").classList.toggle("hidden", tab.dataset.tab !== "batch");
});

function clipEl({ index, text, url, ext, durationSec, error }) {
  const d = document.createElement("div");
  d.className = "clip" + (error ? " err" : "");
  const label = (index != null ? `#${index + 1} · ` : "") +
    (durationSec ? `${durationSec}s · ` : "") + (text || "");
  if (error) {
    d.innerHTML = `<div class="meta">${label}</div><div style="color:#e88">⚠ ${error}</div>`;
  } else {
    d.innerHTML = `<div class="meta">${label}</div>
      <audio controls src="${url}"></audio>
      <a class="dl" href="${url}" download="clip_${(index ?? 0) + 1}.${ext}">download</a>`;
  }
  return d;
}

// single -> raw audio bytes
$("#single-go").onclick = async () => {
  const text = $("#single-text").value.trim();
  if (!text) return;
  const c = cfg();
  $("#single-status").textContent = "generating…";
  $("#single-out").innerHTML = "";
  $("#single-go").disabled = true;
  try {
    const res = await fetch("/tts", { method: "POST", headers: authHeaders(),
      body: JSON.stringify({ text, ...c }) });
    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    $("#single-out").appendChild(clipEl({ text, url, ext: c.format }));
    $("#single-status").textContent = "done";
  } catch (e) {
    $("#single-status").textContent = "✗ " + e.message;
  } finally {
    $("#single-go").disabled = false;
  }
};

// batch -> JSON of base64 audio
$("#batch-go").onclick = async () => {
  const texts = $("#batch-text").value.split("\n").map(s => s.trim()).filter(Boolean);
  if (!texts.length) return;
  const c = cfg();
  $("#batch-status").textContent = `generating ${texts.length} clips… (sequential, please wait)`;
  $("#batch-out").innerHTML = "";
  $("#batch-go").disabled = true;
  try {
    const res = await fetch("/tts/batch", { method: "POST", headers: authHeaders(),
      body: JSON.stringify({ texts, ...c }) });
    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
    const data = await res.json();
    data.items.forEach(it => {
      const url = it.audioBase64 ? `data:${it.contentType};base64,${it.audioBase64}` : null;
      $("#batch-out").appendChild(clipEl({
        index: it.index, text: it.text, durationSec: it.durationSec,
        url, ext: data.format, error: it.error,
      }));
    });
    $("#batch-status").textContent = `done — ${data.succeeded}/${data.count} ok` +
      (data.failed ? `, ${data.failed} failed` : "");
  } catch (e) {
    $("#batch-status").textContent = "✗ " + e.message;
  } finally {
    $("#batch-go").disabled = false;
  }
};
</script>
</body>
</html>
